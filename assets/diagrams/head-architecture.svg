<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 840" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfcfe"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowA" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b" opacity="0.8"/>
    </marker>
    <style>
      .fname { font-family: 'SFMono-Regular', Menlo, Consolas, monospace; font-weight: 700; }
      .desc  { fill: #475569; font-size: 11.5px; }
      .band  { fill: #94a3b8; font-size: 12px; font-weight: 700; letter-spacing: 2px; }
      .elab  { fill: #64748b; font-size: 10.5px; font-style: italic; }
    </style>
  </defs>

  <rect width="1200" height="840" fill="url(#bg)"/>

  <!-- Title -->
  <text x="56" y="52" font-size="27" font-weight="800" fill="#0f172a">How your &lt;head&gt; is assembled</text>
  <text x="57" y="78" font-size="14" fill="#64748b">barbhs.com · Jekyll + Minimal Mistakes — include &amp; data flow</text>

  <!-- Legend -->
  <g font-size="12" fill="#334155">
    <rect x="708" y="40" width="14" height="14" rx="3" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="728" y="51">Output</text>
    <rect x="800" y="40" width="14" height="14" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="820" y="51">Include</text>
    <rect x="898" y="40" width="14" height="14" rx="3" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="918" y="51">Data / config</text>
    <rect x="1030" y="40" width="14" height="14" rx="3" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <text x="1050" y="51">External CDN</text>
  </g>

  <!-- Band labels -->
  <text class="band" transform="rotate(-90 24 158)" x="24" y="158" text-anchor="middle">OUTPUT</text>
  <text class="band" transform="rotate(-90 24 470)" x="24" y="470" text-anchor="middle">TEMPLATE INCLUDES</text>
  <text class="band" transform="rotate(-90 24 705)" x="24" y="705" text-anchor="middle">SOURCES</text>

  <!-- ============ EDGES (drawn first, under cards) ============ -->
  <g fill="none" stroke="#64748b" stroke-width="2">
    <!-- default -> head (up into output) -->
    <path d="M600,250 L600,196" marker-end="url(#arrow)"/>
    <!-- default -> head.html / custom.html -->
    <path d="M555,300 C460,330 360,338 312,366" marker-end="url(#arrow)"/>
    <path d="M645,300 C760,330 850,338 888,366" marker-end="url(#arrow)"/>
    <!-- head.html -> seo / schema -->
    <path d="M255,440 C215,462 200,476 188,498" marker-end="url(#arrow)"/>
    <path d="M345,440 C400,462 430,476 450,498" marker-end="url(#arrow)"/>
    <!-- custom.html -> jsonld -->
    <path d="M905,440 C912,462 918,476 922,498" marker-end="url(#arrow)"/>
  </g>

  <!-- data-source edges -->
  <g fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.85">
    <path d="M180,580 L180,656" marker-end="url(#arrow)"/>
    <path d="M225,580 C320,612 400,624 445,656" marker-end="url(#arrow)"/>
    <path d="M455,580 L455,656" marker-end="url(#arrow)"/>
    <path d="M880,580 C820,612 780,628 745,656" marker-end="url(#arrow)"/>
  </g>
  <!-- jsonld -> config (long, light) -->
  <path d="M850,580 C620,648 380,648 195,656" fill="none" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="2 4" marker-end="url(#arrow)"/>

  <!-- external CDN edges (amber, dashed) -->
  <g fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.6">
    <path d="M450,408 C700,470 900,560 1000,654" marker-end="url(#arrowA)"/>
    <path d="M980,440 C1006,520 1012,580 1012,654" marker-end="url(#arrowA)"/>
  </g>

  <!-- edge label -->
  <text class="elab" x="800" y="616">projects</text>

  <!-- ============ CARDS ============ -->

  <!-- R0: OUTPUT -->
  <g filter="url(#shadow)">
    <rect x="470" y="120" width="260" height="76" rx="15" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
  </g>
  <text class="fname" x="600" y="158" text-anchor="middle" font-size="20" fill="#4338ca">&lt;head&gt; … &lt;/head&gt;</text>
  <text x="600" y="180" text-anchor="middle" font-size="11.5" fill="#6366f1">rebuilt for every page</text>

  <!-- R1: theme default -->
  <g filter="url(#shadow)">
    <rect x="450" y="250" width="300" height="58" rx="14" fill="#f1f5f9" stroke="#475569" stroke-width="1.8"/>
  </g>
  <text class="fname" x="468" y="278" font-size="13.5" fill="#334155">_layouts/default.html</text>
  <text class="desc" x="468" y="296">Minimal Mistakes theme — wraps every page</text>

  <!-- R2: head.html -->
  <g filter="url(#shadow)">
    <rect x="150" y="368" width="300" height="74" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  </g>
  <text class="fname" x="168" y="394" font-size="13.5" fill="#1d4ed8">_includes/head.html</text>
  <text class="desc" x="168" y="414">charset · viewport · feed · analytics</text>
  <text class="desc" x="168" y="430">Plotly · main.css · web fonts</text>

  <!-- R2: head/custom.html -->
  <g filter="url(#shadow)">
    <rect x="750" y="368" width="300" height="74" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  </g>
  <text class="fname" x="768" y="394" font-size="13.5" fill="#1d4ed8">_includes/head/custom.html</text>
  <text class="desc" x="768" y="414">favicons · theme-color</text>
  <text class="desc" x="768" y="430">Material Symbols · site JSON-LD</text>

  <!-- R3: seo.html -->
  <g filter="url(#shadow)">
    <rect x="55" y="500" width="250" height="80" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  </g>
  <text class="fname" x="73" y="526" font-size="13" fill="#1d4ed8">_includes/seo.html</text>
  <text class="desc" x="73" y="546">&lt;title&gt; · description · canonical</text>
  <text class="desc" x="73" y="562">OpenGraph · Twitter cards</text>

  <!-- R3: schema.html -->
  <g filter="url(#shadow)">
    <rect x="330" y="500" width="250" height="80" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  </g>
  <text class="fname" x="348" y="526" font-size="13" fill="#1d4ed8">_includes/schema.html</text>
  <text class="desc" x="348" y="546">per-page JSON-LD:</text>
  <text class="desc" x="348" y="562">Article · HowTo · SoftwareSourceCode</text>

  <!-- R3: schema-jsonld.html -->
  <g filter="url(#shadow)">
    <rect x="775" y="500" width="300" height="80" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  </g>
  <text class="fname" x="793" y="526" font-size="13" fill="#1d4ed8">_includes/schema-jsonld.html</text>
  <text class="desc" x="793" y="546">site identity: Person + WebSite</text>
  <text class="desc" x="793" y="562">breadcrumbs · projects ItemList</text>

  <!-- R4: _config.yml -->
  <g filter="url(#shadow)">
    <rect x="55" y="660" width="250" height="86" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="1.8"/>
  </g>
  <text class="fname" x="73" y="686" font-size="13" fill="#047857">_config.yml</text>
  <text class="desc" x="73" y="706">title · url · description</text>
  <text class="desc" x="73" y="722">author · twitter · og_image</text>

  <!-- R4: front matter -->
  <g filter="url(#shadow)">
    <rect x="330" y="660" width="250" height="86" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="1.8"/>
  </g>
  <text class="fname" x="348" y="686" font-size="13" fill="#047857">page front matter</text>
  <text class="desc" x="348" y="706">page.title · description · image</text>
  <text class="desc" x="348" y="722">stack · tags · status</text>

  <!-- R4: portfolio.json -->
  <g filter="url(#shadow)">
    <rect x="605" y="660" width="250" height="86" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="1.8"/>
  </g>
  <text class="fname" x="623" y="686" font-size="13" fill="#047857">_data/portfolio.json</text>
  <text class="desc" x="623" y="706">projects array →</text>
  <text class="desc" x="623" y="722">ItemList schema</text>

  <!-- R4: External CDNs -->
  <g filter="url(#shadow)">
    <rect x="880" y="660" width="265" height="86" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="1.8"/>
  </g>
  <text class="fname" x="898" y="686" font-size="13" fill="#b45309">External CDNs</text>
  <text class="desc" x="898" y="706">Google Analytics · Plotly</text>
  <text class="desc" x="898" y="722">Font Awesome · Google Fonts · Material Symbols</text>

  <!-- footnote -->
  <text x="56" y="800" font-size="11" fill="#94a3b8">Note: _includes/schema/identity.html (reads _data/schema/person.json) is not wired into the head and the data file is absent — dead code.</text>
</svg>
