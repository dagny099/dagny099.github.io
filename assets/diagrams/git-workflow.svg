<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img"
     aria-labelledby="gwf-title gwf-desc" font-family="'Helvetica Neue',Arial,sans-serif">
  <title id="gwf-title">Git branch and deploy workflow</title>
  <desc id="gwf-desc">Three branches: feature branches merge into dev_branch (synced across laptop and desktop), dev_branch merges into main, and main deploys to the production server.</desc>

  <defs>
    <marker id="ar-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6f5b91"/>
    </marker>
    <marker id="ar-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f6f67"/>
    </marker>
    <marker id="ar-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0572a"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="888" height="428" rx="16" fill="#fbfaf6" stroke="#e6e1d6"/>

  <!-- numbered stage captions -->
  <g font-size="13" fill="#5c5a53" font-weight="600">
    <text x="300" y="40" text-anchor="middle"><tspan fill="#6f5b91">①</tspan> Develop on dev_branch</text>
    <text x="470" y="40" text-anchor="middle"><tspan fill="#c0572a">②</tspan> Feature branch (optional)</text>
    <text x="620" y="40" text-anchor="middle"><tspan fill="#2f6f67">③</tspan> Merge → main</text>
    <text x="800" y="40" text-anchor="middle"><tspan fill="#2f6f67">④</tspan> Deploy</text>
  </g>

  <!-- ===================== MAIN lane (teal) ===================== -->
  <text x="160" y="98" font-size="14" font-weight="700" fill="#2f6f67">main</text>
  <text x="160" y="114" font-size="11" fill="#8a8780">production</text>
  <line x1="235" y1="110" x2="700" y2="110" stroke="#2f6f67" stroke-width="4" stroke-linecap="round"/>

  <!-- ===================== DEV lane (purple) ===================== -->
  <text x="20" y="232" font-size="14" font-weight="700" fill="#6f5b91">dev_branch</text>
  <text x="20" y="248" font-size="11" fill="#8a8780">laptop + desktop</text>
  <line x1="235" y1="240" x2="560" y2="240" stroke="#6f5b91" stroke-width="4" stroke-linecap="round"/>

  <!-- ===================== FEATURE lane (orange) ===================== -->
  <text x="20" y="352" font-size="14" font-weight="700" fill="#c0572a">feature/*</text>
  <text x="20" y="368" font-size="11" fill="#8a8780">experiments</text>
  <line x1="370" y1="360" x2="470" y2="360" stroke="#c0572a" stroke-width="4" stroke-linecap="round"/>

  <!-- ===================== branch / merge curves ===================== -->
  <!-- dev created from main (branch line, no arrow) -->
  <path d="M235,110 C265,110 205,240 235,240" fill="none" stroke="#6f5b91" stroke-width="2.5" opacity="0.7"/>
  <!-- feature branches off dev (branch line, no arrow) -->
  <path d="M330,240 C360,240 340,360 370,360" fill="none" stroke="#c0572a" stroke-width="2.5" opacity="0.7"/>
  <!-- feature merges back into dev -->
  <path d="M470,360 C500,360 470,240 500,240" fill="none" stroke="#c0572a" stroke-width="2.5"
        marker-end="url(#ar-purple)" opacity="0.85"/>
  <!-- dev merges into main -->
  <path d="M560,240 C600,240 570,110 600,110" fill="none" stroke="#6f5b91" stroke-width="2.5"
        marker-end="url(#ar-teal)" opacity="0.85"/>
  <!-- main deploys to server -->
  <path d="M700,110 L760,110" fill="none" stroke="#2f6f67" stroke-width="2.5" marker-end="url(#ar-teal)"/>

  <!-- ===================== commit nodes ===================== -->
  <g>
    <!-- main -->
    <circle cx="235" cy="110" r="7" fill="#fff" stroke="#2f6f67" stroke-width="3"/>
    <circle cx="600" cy="110" r="7" fill="#2f6f67" stroke="#2f6f67" stroke-width="3"/>
    <circle cx="700" cy="110" r="7" fill="#fff" stroke="#2f6f67" stroke-width="3"/>
    <!-- dev -->
    <circle cx="235" cy="240" r="7" fill="#fff" stroke="#6f5b91" stroke-width="3"/>
    <circle cx="330" cy="240" r="7" fill="#fff" stroke="#6f5b91" stroke-width="3"/>
    <circle cx="500" cy="240" r="7" fill="#6f5b91" stroke="#6f5b91" stroke-width="3"/>
    <circle cx="560" cy="240" r="7" fill="#fff" stroke="#6f5b91" stroke-width="3"/>
    <!-- feature -->
    <circle cx="370" cy="360" r="7" fill="#fff" stroke="#c0572a" stroke-width="3"/>
    <circle cx="470" cy="360" r="7" fill="#c0572a" stroke="#c0572a" stroke-width="3"/>
  </g>

  <!-- node hints -->
  <g font-size="10.5" fill="#8a8780" text-anchor="middle">
    <text x="600" y="95">merge</text>
    <text x="500" y="225">merge</text>
  </g>

  <!-- ===================== deploy target (server / EC2) ===================== -->
  <g>
    <rect x="762" y="86" width="118" height="48" rx="8" fill="#fff" stroke="#2f6f67" stroke-width="2"/>
    <rect x="776" y="99" width="20" height="22" rx="2" fill="none" stroke="#2f6f67" stroke-width="2"/>
    <line x1="780" y1="105" x2="792" y2="105" stroke="#2f6f67" stroke-width="2"/>
    <line x1="780" y1="110" x2="792" y2="110" stroke="#2f6f67" stroke-width="2"/>
    <line x1="780" y1="115" x2="787" y2="115" stroke="#2f6f67" stroke-width="2"/>
    <text x="806" y="106" font-size="12.5" font-weight="700" fill="#2f6f67">EC2</text>
    <text x="806" y="121" font-size="10.5" fill="#8a8780">git pull main</text>
  </g>

  <!-- ===================== footnote ===================== -->
  <text x="450" y="418" text-anchor="middle" font-size="12" fill="#8a8780" font-style="italic">
    Filled nodes = merge commits. Push/pull through origin keeps both machines and the server in sync.
  </text>
</svg>
