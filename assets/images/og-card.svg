<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#123B32"/>
      <stop offset="55%" stop-color="#15463B"/>
      <stop offset="100%" stop-color="#14201E"/>
    </linearGradient>
    <linearGradient id="coral" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DC6B4F" stop-opacity="0"/>
      <stop offset="55%" stop-color="#E88A6B" stop-opacity=".85"/>
      <stop offset="100%" stop-color="#DC6B4F" stop-opacity=".3"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="26"/></filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- soft teal glow upper-right -->
  <ellipse cx="900" cy="120" rx="430" ry="220" fill="#2E8273" opacity=".22" filter="url(#soft)"/>

  <!-- teal swell lower -->
  <path d="M-50,470 C260,410 540,520 820,440 C1000,390 1120,450 1260,410 L1260,680 L-50,680 Z"
        fill="#1F7263" opacity=".4" filter="url(#soft)"/>

  <!-- coral filament with graph nodes (the knowledge-graph wink) -->
  <path d="M-40,180 C260,140 520,210 800,150 C980,112 1120,140 1260,96"
        fill="none" stroke="url(#coral)" stroke-width="3" filter="url(#glow)"/>
  <g fill="#E88A6B" filter="url(#glow)">
    <circle cx="800" cy="150" r="5"/>
    <circle cx="912" cy="128" r="4"/>
    <circle cx="1016" cy="120" r="5.5"/>
    <circle cx="1112" cy="112" r="3.6"/>
  </g>
  <g fill="#9FC4B6" opacity=".5">
    <circle cx="700" cy="210" r="3"/>
    <circle cx="560" cy="180" r="2.4"/>
  </g>

  <!-- wordmark / swirl-ish mark -->
  <g transform="translate(90,150)">
    <circle cx="22" cy="22" r="20" fill="none" stroke="#DC6B4F" stroke-width="3.5" stroke-dasharray="78 30" transform="rotate(-30 22 22)"/>
    <circle cx="22" cy="22" r="12" fill="none" stroke="#2E8273" stroke-width="3" stroke-dasharray="44 24" transform="rotate(60 22 22)"/>
  </g>

  <!-- name -->
  <text x="92" y="300" font-family="'EB Garamond', Georgia, serif" font-size="68" font-weight="500" fill="#FBFAF6">Barbara Hidalgo-Sotelo</text>

  <!-- tagline (coral emphasis on 'messy data') -->
  <text x="94" y="372" font-family="'EB Garamond', Georgia, serif" font-size="44" font-style="italic" fill="#EDEAE2">Making meaning from <tspan fill="#E88A6B">messy data</tspan></text>

  <!-- descriptor row, mono -->
  <text x="96" y="448" font-family="'IBM Plex Mono', monospace" font-size="21" letter-spacing="1.5" fill="#9FC4B6">AI &amp; DATA SYSTEMS  ·  KNOWLEDGE GRAPHS  ·  EVALUATION-FIRST</text>

  <!-- thin baseline rule -->
  <rect x="96" y="486" width="150" height="3" fill="#DC6B4F"/>
  <text x="96" y="540" font-family="'IBM Plex Sans', sans-serif" font-size="20" fill="#7FA395">Cognitive scientist who builds things people actually use</text>
</svg>
