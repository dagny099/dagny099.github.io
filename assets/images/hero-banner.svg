<svg width="1920" height="640" viewBox="0 0 1920 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#123B32"/>
      <stop offset="55%" stop-color="#1A5547"/>
      <stop offset="100%" stop-color="#152823"/>
    </linearGradient>
    <linearGradient id="waveA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B6B5E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1F7A6B" stop-opacity=".42"/>
      <stop offset="100%" stop-color="#2E8273" stop-opacity=".15"/>
    </linearGradient>
    <linearGradient id="waveB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#124B42" stop-opacity=".0"/>
      <stop offset="60%" stop-color="#26836F" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#124B42" stop-opacity=".2"/>
    </linearGradient>
    <linearGradient id="coral" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DC6B4F" stop-opacity="0"/>
      <stop offset="45%" stop-color="#DC6B4F" stop-opacity=".18"/>
      <stop offset="75%" stop-color="#E88A6B" stop-opacity=".75"/>
      <stop offset="100%" stop-color="#DC6B4F" stop-opacity=".25"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="640" fill="url(#base)"/>
  <ellipse cx="1380" cy="120" rx="620" ry="260" fill="#2E8273" opacity=".22" filter="url(#softer)"/>
  <ellipse cx="1500" cy="80" rx="320" ry="140" fill="#3D9683" opacity=".18" filter="url(#softer)"/>

  <!-- broad teal swells -->
  <path d="M-50,430 C320,330 640,520 980,420 C1320,320 1620,480 1970,360 L1970,700 L-50,700 Z"
        fill="url(#waveB)" filter="url(#softer)"/>
  <path d="M-50,330 C300,250 700,400 1050,300 C1400,200 1650,340 1970,250 L1970,700 L-50,700 Z"
        fill="url(#waveA)" filter="url(#soft)" opacity=".8"/>
  <path d="M-50,540 C420,470 820,610 1240,520 C1560,455 1760,560 1970,500 L1970,700 L-50,700 Z"
        fill="#124B42" opacity=".5" filter="url(#softer)"/>

  <!-- faint contour lines -->
  <path d="M-50,272 C320,205 700,340 1060,248 C1420,160 1680,280 1970,200"
        fill="none" stroke="#7FA395" stroke-opacity=".14" stroke-width="1.5"/>
  <path d="M-50,360 C340,290 720,430 1080,335 C1440,245 1700,365 1970,290"
        fill="none" stroke="#7FA395" stroke-opacity=".1" stroke-width="1.2"/>

  <!-- the coral filament -->
  <path d="M-50,196 C380,150 760,232 1120,150 C1430,86 1690,118 1970,62"
        fill="none" stroke="url(#coral)" stroke-width="3.6" filter="url(#glow)"/>
  <!-- graph nodes along the filament, denser toward the right (away from headline) -->
  <g fill="#E88A6B" filter="url(#glow)">
    <circle cx="1138" cy="148" r="3.6" fill-opacity=".85"/>
    <circle cx="1316" cy="110" r="3" fill-opacity=".7"/>
    <circle cx="1462" cy="100" r="4" fill-opacity=".9"/>
    <circle cx="1604" cy="96" r="2.8" fill-opacity=".6"/>
    <circle cx="1748" cy="84" r="3.4" fill-opacity=".75"/>
  </g>
  <!-- a few faint teal nodes lower -->
  <g fill="#9FC4B6">
    <circle cx="1240" cy="330" r="2" fill-opacity=".35"/>
    <circle cx="1420" cy="300" r="1.6" fill-opacity=".3"/>
    <circle cx="1560" cy="345" r="2.2" fill-opacity=".3"/>
  </g>

  <!-- darken the left half for headline contrast -->
  <rect width="1920" height="640" fill="url(#textshield)"/>
  <linearGradient id="textshield" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0C1F1B" stop-opacity=".48"/>
    <stop offset="45%" stop-color="#0C1F1B" stop-opacity=".25"/>
    <stop offset="75%" stop-color="#0C1F1B" stop-opacity="0"/>
  </linearGradient>
</svg>
